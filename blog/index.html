---
layout: default
title: Blog
class: blog
---

{% for post in collections.posts limit:10 %}

<article>
  <header>
    <h1>
      <a href="{{ post.url }}"><span class="title">{{ post.data.title }}</span></a>
      <span class="date inner_subhead">{{ post.date | date: "%-m/%-d/%y" }}</span>
    </h1>

    <div class="author hide">By {{ site.author }}</div>
  </header>

  {{ post.templateContent | rename_footnote_link: post.fileSlug }}
</article>

{% endfor %}

<div class="blog_navigation">
  <a href="/blog/archive" class="button">Browse the blog archive <span aria-hidden="true">&#x27A1;</span></a>
</div>
