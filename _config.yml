# Documentation: https://github.com/mojombo/jekyll/wiki/configuration

url: https://chrisltd.com
permalink: /blog/:year/:month/:title/

source: .
destination: ./_site
plugins_dir: ./_plugins

future: false # publish posts dated into the future
exclude: [resources, deploy.sh, deploy_example.sh, localtest.sh, Gemfile.lock, Gemfile, readme.md]

markdown: kramdown
highlighter: rouge

sass:
  sass_dir: scss
  style: compressed
  sourcemap: never

# Plugins
plugins:
  - jekyll-archives

# Jekyll Archives
jekyll-archives:
  enabled:
    - categories
  layouts:
    category: category-archive
  permalinks:
    category: /blog/category/:name/

# Custom
title: Chris Johnson - Frontend Engineer in NYC
description: Chris Johnson is a Frontend Engineer in NYC. This is his portfolio and blog.
tagline: Engineer in NYC
author: Chris Johnson
feed_url: /blog/feed.xml
feed_title: Chris Johnson's Blog
# Cache-busting is automatic: _plugins/assets_hash.rb sets `site.assets_hash`
# from the SHA-1 of the SCSS source tree at build time.
