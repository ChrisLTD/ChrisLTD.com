---
layout: default
class: blog
---

<h1>{{ page.title }}</h1>

<ul class="link_list">
  {% for post in page.posts %} {% unless post.draft %}
  <li>
    <a href="{{ post.url }}">
      <h3><b>{{ post.title }}</b> <span class="inner_subhead">{{ post.date | date: "%-1m/%-1d/%Y" }}</span></h3>
    </a>
  </li>
  {% endunless %} {% endfor %}
</ul>
