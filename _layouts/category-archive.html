---
layout: default
---

<h1>{{ title }}</h1>

<ul class="link_list">
  {% for post in category.posts %} {% unless post.data.draft %}
  <li>
    <a href="{{ post.url }}">
      <h3><b>{{ post.data.title }}</b> <span class="inner_subhead">{{ post.date | date: "%-m/%-d/%Y" }}</span></h3>
    </a>
  </li>
  {% endunless %} {% endfor %}
</ul>
