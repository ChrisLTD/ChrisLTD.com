{{template "base" .}}

{{define "content"}}
<h1 class="text-3xl md:text-4xl font-bold mb-8">Blog</h1>

<div class="space-y-12">
  {{range .Posts}}
  <article class="max-w-3xl">
    <header class="mb-4">
      <h2 class="text-2xl font-bold">
        <a href="{{.URL}}" class="hover:text-primary-dark">{{.Title}}</a>
      </h2>
      <time class="text-gray-medium text-sm" datetime="{{formatDate .Date "2006-01-02"}}">
        {{formatDateShort .Date}}
      </time>
    </header>

    <div class="prose-blog">
      {{.Content}}
    </div>
  </article>
  {{end}}
</div>

<div class="mt-12 pt-8 border-t border-gray-light">
  <a href="/blog/archive" class="btn flex items-center gap-2 w-fit">
    Browse the blog archive
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
  </a>
</div>
{{end}}
