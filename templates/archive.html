{{template "base" .}}

{{define "content"}}
<h1 class="text-3xl md:text-4xl font-bold mb-8">Blog Archive</h1>

<form class="search-form mb-8" action="https://duckduckgo.com/" method="get">
  <input type="hidden" name="sites" value="chrisltd.com">
  <input type="text" name="q" placeholder="Search the blog..." class="flex-1 px-4 py-2 border border-gray-light rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
  <button type="submit" class="btn">Search</button>
</form>

<ul class="space-y-3">
  {{range .Posts}}
  <li>
    <a href="{{.URL}}" class="block p-4 bg-white rounded-lg shadow-sm hover:shadow-md transition-shadow">
      <h3 class="font-semibold text-body hover:text-primary">
        {{.Title}}
        <span class="text-sm text-gray-medium font-normal ml-2">{{formatDateLong .Date}}</span>
      </h3>
    </a>
  </li>
  {{end}}
</ul>

<div class="mt-12 pt-8 border-t border-gray-light">
  <a href="{{.Site.FeedURL}}" class="btn flex items-center gap-2 w-fit">
    Subscribe via RSS
    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M6.18 15.64a2.18 2.18 0 1 1 0 4.36 2.18 2.18 0 0 1 0-4.36m12.03 4.36h-3.88a8.35 8.35 0 0 0-8.33-8.33V7.79a12.23 12.23 0 0 1 12.21 12.21M16.36 20h-3.88a4.48 4.48 0 0 0-4.48-4.48v-3.88A8.36 8.36 0 0 1 16.36 20"/></svg>
  </a>
</div>
{{end}}
